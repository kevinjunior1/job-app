<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/vue@3.3.4/dist/vue.global.js"></script>
</head>
<body>
    <div id="app">
        <div class="dashboard">
            <div class="tab-header">
                <button @click="currentTab = 'form'" :class="['tab-btn', { active: currentTab === 'form' }]">
                    Applicant Form
                </button>
                <button @click="currentTab = 'admin'" :class="['tab-btn', { active: currentTab === 'admin' }]">
                    Admin Dashboard
                    <span v-if="applications.length" class="badge">{{ applications.length }}</span>
                </button>
            </div>
            <div v-if="currentTab === 'form'" class="tab-content">
                <div v-if="showSuccess" class="success-msg">
                    ✅ Application submitted successfully!
                </div>
                <form @submit.prevent="submitForm">
                    <div class="form-row">
                        <label>First Name <span class="required">*</span></label>
                        <input type="text" v-model="form.firstName" required>
                    </div>
                    <div class="form-row">
                        <label>Last Name <span class="required">*</span></label>
                        <input type="text" v-model="form.lastName" required>
                    </div>
                    <div class="form-row">
                        <label>Date of Birth <span class="required">*</span></label>
                        <input type="date" v-model="form.dob" required>
                    </div>
                    <div class="form-row">
                        <label>Address <span class="required">*</span></label>
                        <textarea v-model="form.address" required></textarea>
                    </div>
                    <div class="form-row">
                        <label>Phone <span class="required">*</span></label>
                        <input type="tel" v-model="form.phone" required>
                    </div>
                    <div class="form-row">
                        <label>Gender <span class="required">*</span></label>
                        <div class="radio-group">
                            <label><input type="radio" value="Male" v-model="form.gender"> Male</label>
                            <label><input type="radio" value="Female" v-model="form.gender"> Female</label>
                            <label><input type="radio" value="Other" v-model="form.gender"> Other</label>
                        </div>
                    </div>
                    <div class="form-row">
                        <label>National ID <span class="required">*</span></label>
                        <input type="text" v-model="form.nationalId" required>
                    </div>
                    <button type="submit" class="submit-btn">Submit Application</button>
                </form>
            </div>

            <!-- Admin Dashboard -->
            <div v-if="currentTab === 'admin'" class="tab-content">
                <h2>All Applications</h2>
                <div v-if="applications.length === 0" class="empty-state">
                    No applications yet.
                </div>
                <div v-else class="table-wrapper">
                    <table>
                        <thead>
                            <tr><th>#</th><th>First</th><th>Last</th><th>DOB</th><th>Address</th><th>Phone</th><th>Gender</th><th>ID</th></tr>
                        </thead>
                        <tbody>
                            <tr v-for="(app, idx) in applications" :key="idx">
                                <td>{{ idx+1 }}</td>
                                <td>{{ app.firstName }}</td>
                                <td>{{ app.lastName }}</td>
                                <td>{{ app.dob }}</td>
                                <td>{{ app.address }}</td>
                                <td>{{ app.phone }}</td>
                                <td>{{ app.gender }}</td>
                                <td>{{ app.nationalId }}</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
